name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: uv sync
        run: python -m uv sync
      - name: ruff check
        run: python -m uv run ruff check .
        continue-on-error: true
      - name: ruff format
        run: python -m uv run ruff format --check .
        continue-on-error: true
      - name: mypy core
        run: python -m uv run mypy app/core
        continue-on-error: true
      - name: pytest
        run: python -m uv run pytest --cov=app --cov-report=term-missing
